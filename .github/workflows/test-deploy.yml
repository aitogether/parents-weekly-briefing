name: 父母周报 - 自动化测试

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch: {}

jobs:
  test-backend:
    name: 🧪 后端测试
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      
      - name: 📦 安装依赖
        run: |
          cd backend
          npm install --only=production
      
      - name: 🚀 启动服务
        run: |
          cd backend
          nohup npm start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in 1 2 3 4 5; do
            if curl -s http://localhost:3000/health > /dev/null; then echo "✅ 服务启动"; break; fi
            echo "等待服务... ($i/5)"; sleep 3;
          done
          # 无论成功失败都保存日志
          echo "=== 后端日志 ===" >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/backend.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          if ! curl -s http://localhost:3000/health > /dev/null; then
            echo "❌ 健康检查失败"
            exit 1
          fi
        timeout-minutes: 2
      
      - name: 🧪 运行测试
        if: always()
        run: |
          cd test
          node checklist-api.test.js 2>&1 | tee /tmp/test.log
          echo "=== 测试日志 ===" >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/test.log >> $GITHUB_STEP_SUMMARY
        timeout-minutes: 2
      
      - name: 📤 上传日志
        if: always()
        run: |
          mkdir -p artifacts
          cp /tmp/backend.log artifacts/backend.log
          cp /tmp/test.log artifacts/test.log
          echo "服务状态: $(curl -s http://localhost:3000/health || echo '无法连接')" > artifacts/status.txt
        continue-on-error: true
      
      - name: 📊 生成报告
        if: always()
        run: |
          echo "测试报告: ${{ github.run_id }}" > report.txt
          echo "时间: $(date)" >> report.txt
          echo "健康: $(curl -s http://localhost:3000/health || echo 'failed')" >> report.txt
          echo "结果: $(tail -5 /tmp/test.log 2>/dev/null || echo '无测试日志')" >> report.txt
      
      - name: 📤 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt
      
      - name: 📤 上传完整日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-logs
          path: |
            artifacts/
      
      - name: 🛑 清理
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill $(cat /tmp/backend.pid) 2>/dev/null || true; fi
