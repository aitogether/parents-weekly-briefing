name: 父母周报 - 自动化测试

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch: {}

jobs:
  test-backend:
    name: 🧪 后端测试
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      
      - name: 📦 安装依赖
        run: |
          cd backend
          npm install --only=production
      
      - name: 🚀 启动服务
        run: |
          cd backend
          nohup npm start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in 1 2 3 4 5; do
            if curl -s http://localhost:3000/health > /dev/null; then echo "✅ 服务启动"; break; fi
            echo "等待服务... ($i/5)"; sleep 3;
          done
          if ! curl -s http://localhost:3000/health > /dev/null; then tail -50 /tmp/backend.log; exit 1; fi
        timeout-minutes: 2
      
      - name: 🧪 运行测试
        run: |
          cd test
          node checklist-api.test.js 2>&1 | tee /tmp/test.log
        timeout-minutes: 2
      
      - name: 📊 生成报告
        if: always()
        run: |
          cat > report.txt << EOF
          测试报告: ${{ github.run_id }}
          时间: $(date)
          健康: $(curl -s http://localhost:3000/health)
          结果: $(tail -5 /tmp/test.log)
          EOF
      
      - name: 📤 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt
      
      - name: 🛑 清理
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill $(cat /tmp/backend.pid) 2>/dev/null || true; fi
